spring:
  config:
    activate:
      on-profile: prod

  # Redis 인프라 미구축 상태 — autoconfig 비활성
  # (추가 시: 아래 exclude 제거 + data.redis 설정 주석 해제)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      ssl:
        enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SSL
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:mopl-prod}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all

# 콘텐츠 검색용 OpenSearch — 검색 기능(#402) 착수 시 값 채울 것
# opensearch.uris 기본값이 localhost:9200이라, 비워두면 기동은 되지만 검색 시점에 connection refused
# opensearch:
#   uris: ${OPENSEARCH_URIS}
#   username: ${OPENSEARCH_USERNAME}
#   password: ${OPENSEARCH_PASSWORD}
#   connection-timeout: 3s
#   socket-timeout: 10s

server:
  forward-headers-strategy: native
  tomcat:
    threads:
      max: 100
      min-spare: 10

# 배포 환경: 이미지를 S3에 저장
mopl:
  storage:
    type: s3
    s3:
      bucket-name: ${S3_BUCKET}
      region: ${AWS_REGION}
      cdn-base-url: ${CDN_BASE_URL}
  auth:
    cookie:
      secure: true
      same-site: None

logging:
  level:
    root: INFO
    com.codeit.team5.mopl: INFO
