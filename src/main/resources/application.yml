spring:
  application:
    name: mopl
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# 이미지 저장소 전략 (구현체는 mopl.storage.type 값으로 선택)
#   - local: 로컬/테스트용 저장
#   - s3    : 배포용 S3 저장
mopl:
  storage:
    type: ${MOPL_STORAGE_TYPE:local}   # 기본값: 로컬
  admin:
    email: ${ADMIN_EMAIL:exampleEmail@example.com}
    password: ${ADMIN_PASSWORD:wrongPassword1234}
    name: ${ADMIN_NAME:admin}

jwt:
  access-secret-key: ${JWT_ACCESS_SECRET_KEY}
  refresh-secret-key: ${JWT_REFRESH_SECRET_KEY}
  access-token-expiration-minutes: 30
  refresh-token-expiration-minutes: 420
