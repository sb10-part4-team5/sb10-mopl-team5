spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mopl?reWriteBatchedInserts=true}
    username: ${DB_USERNAME:mopl}
    password: ${DB_PASSWORD:mopl}
    driver-class-name: org.postgresql.Driver

generator:
  user: 1000
  content: 5000
  tag: 100
  tag-per-content: 3
  review-per-user: 5
  playlist-per-user: 3
  item-per-playlist: 10
  subscription-per-user: 5
  follow-per-user: 10
  notification-per-user: 20
  db-batch-size: 1000
