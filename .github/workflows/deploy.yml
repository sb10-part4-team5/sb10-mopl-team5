name: Deploy to ECS

on:
  push:
    branches: [main]

# 같은 브랜치 배포가 겹치면 이전 실행을 취소 (오래된 배포가 최신을 덮어쓰는 것 방지)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: mopl
  ECS_CLUSTER: mopl-cluster
  ECS_SERVICE: mopl-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC 토큰 발급 (AWS 로그인용)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # OIDC 사용 — GITHUB_TOKEN을 .git에 저장하지 않음

      # 액세스 키 없이 OIDC로 AWS 로그인 (mopl-github-actions-role)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::433041915727:role/mopl-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # 현재 task definition을 받아 이미지를 이번 커밋(sha)으로 교체
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition mopl \
            --query 'taskDefinition' > task-definition.json

      - name: Render image (sha 태그로 고정)
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb # v1
        with:
          task-definition: task-definition.json
          container-name: mopl
          image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      # 새 task def revision 등록 + 서비스 배포 + 안정화 대기 (실패/롤백 시 에러)
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c # v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
