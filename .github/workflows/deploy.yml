name: Deploy to ECS

on:
  push:
    branches: [main]

# 같은 브랜치 배포가 겹치면 이전 실행을 취소 (오래된 배포가 최신을 덮어쓰는 것 방지)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: mopl
  ECS_CLUSTER: mopl-cluster
  ECS_SERVICE: mopl-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC 토큰 발급 (AWS 로그인용)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 액세스 키 없이 OIDC로 AWS 로그인 (mopl-github-actions-role)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433041915727:role/mopl-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # ECS 서비스를 새 이미지로 강제 재배포 (latest 다시 pull)
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      # 배포 결과 확인 — 안정화 대기 후 rolloutState 검사
      # COMPLETED 가 아니면(롤백/실패) step 실패 처리하여 CD를 빨간불로
      - name: Verify deployment
        run: |
          echo "서비스 안정화 대기 중..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
          STATE=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --query 'services[0].deployments[0].rolloutState' --output text)
          echo "rolloutState=$STATE"
          if [ "$STATE" != "COMPLETED" ]; then
            echo "::error::배포 실패 또는 롤백됨 (rolloutState=$STATE)"
            exit 1
          fi
          echo "배포 성공"
