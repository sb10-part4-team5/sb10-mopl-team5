name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 및 커버리지 검증
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification

      - name: 커버리지 리포트를 CodeCov에 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml  # 테스트 리포트의 파일 경로 명시
          fail_ci_if_error: true                                  # 업로드 실패 시 CI 실패 처리
